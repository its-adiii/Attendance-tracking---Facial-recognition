# AuraTrack OpenCV Render Configuration
# Proper face recognition with OpenCV

services:
  - type: web
    name: auralive-opencv
    env: python
    plan: free
    buildCommand: pip install -r requirements-opencv.txt
    startCommand: python opencv_backend.py
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        value: auralive-opencv-secret-key
      - key: PORT
        value: 8080
      - key: HOST
        value: 0.0.0.0

databases:
  - name: auralive-opencv-db
    plan: free
    databaseName: auralive
    user: auralive

# AuraTrack Netlify Configuration
# Static hosting for face recognition demo

[build]
  publish = "dist"
  command = "echo 'Static site ready for Netlify deployment'"

[build.environment]
  NODE_VERSION = "18"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=https://auratrack.netlify.app microphone=https://auratrack.netlify.app"
